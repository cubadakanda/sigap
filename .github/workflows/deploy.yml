name: Deploy SIGAP to AWS ECR and ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-southeast-1
  ECS_CLUSTER: sigap-cluster
  # Sesuaikan nama service di bawah jika berbeda dengan di AWS ECS kamu
  BACKEND_SERVICE: sigap-backend-final
  FRONTEND_SERVICE: sigap-frontend-service
  ECR_REPO_BACKEND: sigap-backend
  ECR_REPO_FRONTEND: sigap-frontend

jobs:
  deploy:
    name: Build, Push to ECR, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Backend to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPO_BACKEND }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ env.ECR_REPO_BACKEND }}:$IMAGE_TAG

      - name: Build and Push Frontend to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          cd frontend
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPO_FRONTEND }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ env.ECR_REPO_FRONTEND }}:$IMAGE_TAG

      - name: Update Backend ECS service
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.BACKEND_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}

      - name: Update Frontend ECS service
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.FRONTEND_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}