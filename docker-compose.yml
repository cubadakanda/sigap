version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: sigap-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sigap_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sigap-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigap-backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: root
      DB_NAME: sigap_db
      PORT: 5000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173,http://localhost:3000
      AWS_REGION: ap-southeast-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      S3_BUCKET_NAME: sigap-storage
      CLOUDFRONT_URL: https://d12345.cloudfront.net
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sigap-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sigap-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - sigap-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  mysql_data:

networks:
  sigap-network:
    driver: bridge
